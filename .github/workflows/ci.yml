name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: make check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run make check
        run: make check

      - name: Verify build
        run: make build VERSION=ci-${{ github.sha }}

      - name: Verify version stamping
        run: ./bin/cs --version | grep -q "ci-${{ github.sha }}"
