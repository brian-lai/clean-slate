name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: make check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run make check
        run: make check

      - name: Verify build
        run: make build VERSION=ci-${{ github.sha }}

      - name: Verify version stamping
        run: ./bin/cs --version | grep -q "ci-${{ github.sha }}"

  race:
    name: go test -race (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run race detector
        run: go test -race ./...

  cross-compile-windows:
    name: GOOS=windows go build (stub check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build for Windows
        run: GOOS=windows go build ./...
