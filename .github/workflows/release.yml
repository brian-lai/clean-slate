name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for auto-generated release notes

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag

  update-tap:
    name: Bump Homebrew tap formula
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula in brian-lai/homebrew-tap
        uses: dawidd6/action-homebrew-bump-formula@v4
        with:
          token: ${{ secrets.TAP_REPO_TOKEN }}
          tap: brian-lai/homebrew-tap
          formula: clean-slate
          tag: ${{ github.ref_name }}
          revision: ${{ github.sha }}
          force: false
          no_fork: true
